<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Netflix</title>
  <link rel="icon" href="https://www.netflix.com/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: url('https://assets.nflxext.com/ffe/siteui/acquisition/ourStory/fuji/desktop/hero-lg.jpg') center/cover no-repeat;
      z-index: 0;
    }
    .bg-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
    }

    /* Navbar */
    .navbar {
      position: relative;
      z-index: 10;
      padding: 20px 60px;
      display: flex;
      align-items: center;
    }
    .navbar img { height: 44px; }

    /* Form Container */
    .form-wrapper {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-box {
      background: rgba(0, 0, 0, 0.82);
      border-radius: 6px;
      padding: 60px 68px 70px;
      width: 100%;
      max-width: 450px;
    }

    .form-box h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 26px 20px 10px;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #aaa; }
    .form-group label {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      color: #8c8c8c;
      font-size: 1rem;
      pointer-events: none;
      transition: all 0.2s;
    }
    .form-group input:focus + label,
    .form-group input:not(:placeholder-shown) + label {
      top: 14px;
      font-size: 0.72rem;
      color: #8c8c8c;
    }
    .form-group input:focus { border-color: #e50914; }
    .form-group input.error { border-color: #e87c03; }
    .error-msg {
      color: #e87c03;
      font-size: 0.82rem;
      margin-top: 4px;
      display: none;
    }
    .error-msg.show { display: block; }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: #e50914;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
    }
    .btn-submit:hover { background: #f40612; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { background: #a00; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #737373;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #333;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: rgba(232, 124, 3, 0.15); color: #e87c03; border: 1px solid rgba(232,124,3,0.3); }
    .alert-success { background: rgba(70, 211, 105, 0.15); color: #46d369; border: 1px solid rgba(70,211,105,0.3); }

    .signup-link {
      margin-top: 52px;
      color: #737373;
      font-size: 1rem;
    }
    .signup-link a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }
    .signup-link a:hover { text-decoration: underline; }

    .remember-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .remember-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #b3b3b3;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .remember-row a {
      color: #b3b3b3;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .remember-row a:hover { text-decoration: underline; }

    footer {
      position: relative;
      z-index: 10;
      background: rgba(0,0,0,0.75);
      padding: 24px 60px;
      color: #737373;
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      .navbar { padding: 20px 24px; }
      .form-box { padding: 36px 24px 48px; }
      footer { padding: 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-overlay"></div>

  <nav class="navbar">
    <a href="index.html">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" />
    </a>
  </nav>

  <div class="form-wrapper">
    <div class="form-box">
      <h1>Sign In</h1>

      <div class="alert alert-error" id="alertBox"></div>

      <form id="loginForm">
        <div class="form-group">
          <input type="email" id="email" name="email" placeholder=" " autocomplete="email" required />
          <label for="email">Email address</label>
          <div class="error-msg" id="emailErr">Please enter a valid email.</div>
        </div>
        <div class="form-group">
          <input type="password" id="password" name="password" placeholder=" " autocomplete="current-password" required />
          <label for="password">Password</label>
          <div class="error-msg" id="passErr">Password must be at least 6 characters.</div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>

        <div class="remember-row">
          <label><input type="checkbox" /> Remember me</label>
          <a href="#">Need help?</a>
        </div>
      </form>

      <div class="signup-link">
        New to Netflix? <a href="register.html">Sign up now</a>
      </div>
    </div>
  </div>

  <footer>
    <p>Questions? Call <strong>000-800-919-1694</strong></p>
  </footer>

  <script>
    const API = 'https://netflix-clone-fullstack-1.onrender.com/api';

    // If already logged in → go to browse
    if (localStorage.getItem('nf_token')) {
      window.location.href = 'browse.html';
    }

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');

    function showAlert(msg, type = 'error') {
      alertBox.textContent = msg;
      alertBox.className = `alert alert-${type} show`;
    }
    function hideAlert() {
      alertBox.className = 'alert';
    }
    function setLoading(loading) {
      if (loading) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Signing in...';
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Sign In';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const email = emailInput.value.trim();
      const password = passInput.value.trim();

      if (!email || !password) {
        showAlert('Please fill in all fields.');
        return;
      }

      setLoading(true);
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert(data.message || 'Login failed. Please try again.');
          setLoading(false);
          return;
        }

        // Save token + user
        localStorage.setItem('nf_token', data.token);
        localStorage.setItem('nf_user', JSON.stringify(data.user));

        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = 'browse.html'; }, 800);

      } catch (err) {
        showAlert('Cannot connect to server. Make sure backend is running on port 5000.');
        setLoading(false);
      }
    });

    // Pre-fill email from index page
    const params = new URLSearchParams(window.location.search);
    if (params.get('email')) {
      emailInput.value = decodeURIComponent(params.get('email'));
    }
  </script>
</body>
</html>
